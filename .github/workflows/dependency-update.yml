# =============================================================================
# MB Dependency Version Update
# =============================================================================
# Detects outdated Maven dependencies (parent POM, properties, direct deps)
# using the versions-maven-plugin configured in pom.xml with version-rules.xml.
#
# Behavior per trigger:
#   pull_request       → Read-only check: displays available updates in the log
#   push (this file)   → Applies updates, verifies compile, creates a PR (for testing)
#   schedule/dispatch  → Applies updates, verifies compile, creates a PR
# =============================================================================

name: MB Dependency Version Update

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths: [ ".github/workflows/dependency-update.yml" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight

permissions:
  contents: write
  pull-requests: write

# ---------------------------------------------------------------------------
# Job 1: Read-only version check (runs only on pull_request)
# ---------------------------------------------------------------------------
jobs:
  check-versions:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check for available version updates
        run: |
          echo "::group::Parent POM updates"
          mvn -B versions:display-parent-updates --file pom.xml
          echo "::endgroup::"

          echo "::group::Property updates"
          mvn -B versions:display-property-updates --file pom.xml
          echo "::endgroup::"

          echo "::group::Dependency updates"
          mvn -B versions:display-dependency-updates --file pom.xml
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Job 2: Apply updates + create PR (runs only on schedule / workflow_dispatch)
  # ---------------------------------------------------------------------------
  update-and-pr:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # https://docs.github.com/en/apps/creating-github-apps/authenticating-with-a-github-app/making-authenticated-api-requests-with-a-github-app-in-a-github-actions-workflow
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.generate-token.outputs.token }}

      - name: Check if update PR already exists
        id: pr-exists
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          OPEN_PRS=$(gh pr list --head automated/dependency-updates --state open --json number --jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "An open dependency update PR already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No open dependency update PR found. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 25
        if: steps.pr-exists.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Apply all version updates
        if: steps.pr-exists.outputs.skip == 'false'
        run: |
          mvn -B versions:update-parent -DgenerateBackupPoms=false --file pom.xml
          mvn -B versions:update-properties -DgenerateBackupPoms=false --file pom.xml

      - name: Check if pom.xml changed
        if: steps.pr-exists.outputs.skip == 'false'
        id: diff
        run: |
          if git diff --quiet pom.xml; then
            echo "All dependencies are up to date."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            {
              echo 'body<<EOF'
              echo '## 🔄 MB Dependency Version Updates'
              echo ''
              echo 'This PR was automatically created by the **MB Dependency Version Update** workflow.'
              echo ''
              echo '### Changes'
              echo '```diff'
              git diff pom.xml
              echo '```'
              echo ''
              echo '### Checklist'
              echo '- [ ] Review the version changes above'
              echo '- [ ] Verify CI build passes'
              echo '- [ ] Check for breaking changes in release notes'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build compiles
        if: steps.pr-exists.outputs.skip == 'false' && steps.diff.outputs.has_changes == 'true'
        run: mvn -B compile --file pom.xml

      - name: Create Pull Request
        if: steps.pr-exists.outputs.skip == 'false' && steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "build(deps): update Maven dependency versions"
          branch: automated/dependency-updates
          delete-branch: true
          title: "build(deps): update Maven dependency versions"
          body: ${{ steps.diff.outputs.body }}
          labels: |
            dependencies
            automated
          reviewers: ${{ github.repository_owner }}
